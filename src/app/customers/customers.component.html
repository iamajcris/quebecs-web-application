<div class="modal-header">
  <h4 class="modal-title">Customer form</h4>
  <button type="button" class="btn-close" aria-label="Close" (click)="activeModal.dismiss('Cross click')"></button>
</div>
<div class="modal-body">
  <div class="row">
    <div class="col">
      <form class="needs-validation" [formGroup]="form">
        <div class="row g-3">
          <div class="col-sm-6">
            <label for="firstName" class="form-label">First name</label>
            <input type="text" class="form-control" id="firstName" formControlName="firstName" placeholder="" value="" required>
            <div class="invalid-feedback">
              Valid first name is required.
            </div>
          </div>

          <div class="col-sm-6">
            <label for="lastName" class="form-label">Last name</label>
            <input type="text" class="form-control" id="lastName" formControlName="lastName" placeholder="" value="" required>
            <div class="invalid-feedback">
              Valid last name is required.
            </div>
          </div>

          <div class="col-12">
            <label for="address" class="form-label">Address</label>
            <input type="text" class="form-control" id="address" formControlName="address" placeholder="1234 Main St" required>
            <div class="invalid-feedback">
              Please enter your shipping address.
            </div>
          </div>

          <div class="col-12">
            <label for="mobileNumber" class="form-label">Mobile number</label>
            <input type="tel" class="form-control" id="mobileNumber" formControlName="mobileNumber" placeholder="+63" required>
            <div class="invalid-feedback">
              Please enter mobile number.
            </div>
          </div>
          
        </div>
      </form>
    </div>
  </div>  
</div>
<div class="modal-footer">
  <button type="button" class="btn btn-primary" (click)="save()" [disabled]="this.isSaving">
    Save
    <span class="spinner-border spinner-border-sm" role="status" [hidden]="!this.isSaving"></span>
  </button>
  <button type="button" class="btn btn-outline-dark" (click)="activeModal.close('Close click')">Close</button>
</div>
