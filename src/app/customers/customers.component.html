<div class="px-3 py-2 border-bottom mb-3">
  <div class="container d-flex flex-wrap justify-content-center">
    <form class="col-12 col-lg-auto mb-2 mb-lg-0 me-lg-auto" [formGroup]="form">
      <input type="search" class="form-control" placeholder="Search by name..." aria-label="Search" formControlName="search">
    </form>

    <div class="text-end align-self-end">
      <button type="button" class="btn btn-primary btn-sm" (click)="openCustomerModal()">
        <i class="bi bi-plus"></i>
        Add Customer
      </button>
    </div>
  </div>
</div>

<main class="container-md">
<div class="my-3 p-3 bg-body rounded shadow-sm">
  <div class="d-flex">
    <div class="pb-2 mb-0 small lh-sm w-100">
      <div class="d-flex justify-content-between">
        <span class="heading align-self-center">Customers</span>
      </div>
    </div>
  </div>

  <div class="table-responsive">
    <table class="table table-striped table-sm">
      <thead>
        <tr>
          <th scope="col">#</th>
          <th scope="col">Firstname</th>
          <th scope="col">Lastname</th>
          <th scope="col">Address</th>
          <th scope="col">Mobile #</th>
        </tr>
      </thead>
      <tr *ngIf="isLoading">
        <td colspan="6">
          <div class="d-flex justify-content-center">
            <div class="spinner-border text-primary" role="status" aria-hidden="true"></div>
          </div>
        </td>
      </tr>
      <tbody *ngIf="customers">
        <tr *ngFor="let customer of filteredCustomers">
          <th scope="row">
            <a class="text-decoration-none pointer" (click)="openCustomerModal(customer)">
              {{ customer.customerId }}
            </a>
          </th>
          <td> {{ customer.firstName }}</td>
          <td>{{ customer.lastName }}</td>
          <td class="text-nowrap">{{ customer.address }}</td>
          <td>{{ customer.mobileNumber }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</main>
