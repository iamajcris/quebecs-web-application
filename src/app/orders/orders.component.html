<main class="container mt-5">
	<div class="my-3 bg-body rounded-5 shadow-lg p-4">
		<div class="p-3 border-bottom">
			<div class=" mb-0 small  lh-sm w-100">
				<div class="d-flex justify-content-between">
					<h4 class="text-wrap">Online Turo-turo</h4>
					<form class="w-100">
						<div class="d-flex justify-content-end" [formGroup]="filterGroup">
							<div class="col-3">
								<input type="search" class="form-control" placeholder="Search by customer..."
									aria-label="Search" formControlName="search">
							</div>
							<div class="col-auto">
								<select class="form-select form-control-sm" formControlName="dateRange">
									<option *ngFor="let opt of filterDateOptions" [value]="opt.text">
										{{opt.text}}
									</option>
								</select>
							</div>
							<div class="col-auto">
								<div class="dp-hidden position-absolute">
									<div class="input-group">
										<input name="datepicker" class="form-control" ngbDatepicker
											#datepicker="ngbDatepicker" [autoClose]="'outside'"
											(dateSelect)="onDateSelection($event)" [displayMonths]="2" [dayTemplate]="t"
											outsideDays="hidden" [startDate]="fromDate.value!" tabindex="-1" />
										<ng-template #t let-date let-focused="focused">
											<span class="custom-day" [class.focused]="focused"
												[class.range]="isRange(date)"
												[class.faded]="isHovered(date) || isInside(date)"
												(mouseenter)="hoveredDate = date" (mouseleave)="hoveredDate = null">
												{{ date.day }}
											</span>
										</ng-template>
									</div>
								</div>
								<div class="input-group">
									<input #dpFromDate class="form-control" placeholder="yyyy-mm-dd" name="dpFromDate"
										[value]="formatter.format(fromDate.value) + ' - ' + formatter.format(toDate.value)"
										(input)="fromDate.value = validateInput(fromDate.value, dpFromDate.value)" />
									<button class="btn btn-outline-secondary bi bi-calendar3"
										(click)="datepicker.toggle()" type="button"></button>
								</div>
							</div>
						</div>
					</form>
					<!-- <div class="btn-toolbar" role="toolbar">
						<div class="btn-group btn-group-sm me-2" role="group">
							<input type="radio" class="btn-check btn-sm " name="btnradio" id="btnradio1" autocomplete="off">
							<label class="btn btn-outline-primary" for="btnradio1">Imus Online Turo-turo</label>
						</div>
						<div class="btn-group btn-group-sm me-2" role="group">
							<input type="radio" class="btn-check btn-sm" name="btnradio" id="btnradio2" autocomplete="off">
							<label class="btn btn-outline-primary" for="btnradio2">Quebec's</label>
						</div>
					</div> -->
				</div>
			</div>
		</div>
		<div class="table-responsive">
			<table class="table table-striped table-sm pb-1">
				<thead>
					<tr class="bg-primary">
						<th class="text-center py-4" scope="col"></th>
						<th class="text-center py-4" scope="col">#</th>
						<th class="text-center py-4" scope="col">Date</th>
						<th class="text-center py-4" scope="col">Time</th>
						<th class="text-center py-4" scope="col">Customer</th>
						<th class="text-center py-4" scope="col">Total</th>
						<th class="text-center py-4" scope="col">Actions</th>
						<th class="text-center py-4" scope="col text-">Status</th>
					</tr>
				</thead>
				<tr *ngIf="isLoading">
					<td colspan="6">
						<div class="d-flex justify-content-center">
							<div class="spinner-border text-primary" role="status" aria-hidden="true"></div>
						</div>
					</td>
				</tr>
				<tr *ngFor="let order of orderList">
					<td></td>
					<td class="text-center" scope="row">
						<button type="button" class="btn btn-link" (click)="openOrder(order)">
							{{ order.orderId }}
						</button>
					</td>
					<td class="text-center">{{ order.orderDate | date:'MM/dd/yyyy' }}</td>
					<td class="text-center">{{ order.orderDate | date:'h:mma' }}</td>
					<td class="text-center">{{ order.customer.firstName}} {{ order.customer.lastName}}</td>
					<td class="text-center">{{ order.total }}</td>
					<td class="text-center">
						<p>
							<a class="text-decoration-none pointer me-2" (click)="print(order)">
								<i class="bi bi-printer-fill fs-3"></i>
							</a>
							<a class="text-decoration-none pointer" (click)="copy(order)">
								<i class="bi bi-clipboard-fill fs-3"></i>
							</a>
						</p>
					</td>
					<td *ngIf="order.statusType === 'Tallied'" class="text-center"><button type="button" class="btn btn-outline-success " disabled>Tallied</button></td>
					<td *ngIf="order.statusType === 'created'" class="text-center"><button type="button" class="btn btn-outline-warning" disabled>Created</button></td>
				</tr>
			</table>
			<!-- <table>
		<tr *ngFor="let order of orderList">
			<td *ngFor="let subItem of order.subItems">{{ subItem.text == 'Mass Delivery' }}</td>   
			</tr>
	  </table> -->
		</div>
		<div class="position-fixed bottom-0 p-1 start-50 translate-middle bg-dark rounded-5 shadow-lg">
			<button type="button" class="btn outline btn-lg m-1 shadow-none text-light" (click)="tallyOrder()">
				<i class="bi bi-printer"></i>
				Print Tally
			</button>
			<button type="button" class="btn outline btn-lg m-1 shadow-none text-light" (click)="openOrder()">
				<i class="bi bi-plus"></i>
				Add order
			</button>
		</div>
	</div>
</main>
