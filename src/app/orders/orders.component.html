<main class="container-md">
  <div class="my-3 bg-body rounded shadow-sm">
    <div class="p-3">
      <div class="pb-2 mb-0 small border-bottom lh-sm w-100">
        <div class="d-flex justify-content-between">
          <button type="button" class="btn btn-primary btn-sm" (click)="openOrder()">
						<i class="bi bi-plus"></i>
						Add order
					</button>
        </div>
      </div>
			<div class="d-flex pt-3">
				<form class="w-100">
					<div class="row" [formGroup]="filterGroup">
						<div class="col-3">
							<input type="search" class="form-control" placeholder="Search by customer..." aria-label="Search" formControlName="search">
						</div>
						<div class="col-auto">
							<select class="form-select form-control-sm" formControlName="dateRange">
								<option *ngFor="let opt of filterDateOptions" [value]="opt.text">
									{{opt.text}}
								</option>
							</select>
						</div>
						<div class="col-auto">
							<div class="dp-hidden position-absolute">
								<div class="input-group">
									<input
										name="datepicker"
										class="form-control"
										ngbDatepicker
										#datepicker="ngbDatepicker"
										[autoClose]="'outside'"
										(dateSelect)="onDateSelection($event)"
										[displayMonths]="2"
										[dayTemplate]="t"
										outsideDays="hidden"
										[startDate]="fromDate.value!"
										tabindex="-1"
									/>
									<ng-template #t let-date let-focused="focused">
										<span
											class="custom-day"
											[class.focused]="focused"
											[class.range]="isRange(date)"
											[class.faded]="isHovered(date) || isInside(date)"
											(mouseenter)="hoveredDate = date"
											(mouseleave)="hoveredDate = null"
										>
											{{ date.day }}
										</span>
									</ng-template>
								</div>
							</div>
							<div class="input-group">
								<input
									#dpFromDate
									class="form-control"
									placeholder="yyyy-mm-dd"
									name="dpFromDate"
									[value]="formatter.format(fromDate.value) + ' - ' + formatter.format(toDate.value)"
									(input)="fromDate.value = validateInput(fromDate.value, dpFromDate.value)"
								/>
								<button class="btn btn-outline-secondary bi bi-calendar3" (click)="datepicker.toggle()" type="button"></button>
							</div>
						</div>
					</div>
				</form>
			</div>
    </div>

    <div class="table-responsive">
      <table class="table table-striped table-sm">
        <thead>
          <tr>
						<th scope="col"></th>
            <th scope="col">#</th>
            <th scope="col">Order date</th>
            <th scope="col">Time</th>
            <th scope="col">Customer</th>
            <th scope="col">Total Price</th>
						<th scope="col">Status</th>
          </tr>
        </thead>
        <tr *ngIf="isLoading">
          <td colspan="6">
            <div class="d-flex justify-content-center">
              <div class="spinner-border text-primary" role="status" aria-hidden="true"></div>
            </div>
          </td>
        </tr>
        <tr *ngFor="let order of orderList">
					<td></td>
					<td scope="row">
						<button type="button" class="btn btn-link" (click)="openOrder(order)">
							{{ order.orderId }}
						</button>
					</td>
					<td>{{ order.orderDate | date:'MM/dd/yyyy' }}</td>
					<td>{{ order.orderDate | date:'h:mma' }}</td>
					<td>{{ order.customer.firstName}} {{ order.customer.lastName}}</td>
					<td>{{ order.total }}</td>
					<td>
						<p>
							<a class="text-decoration-none pointer" (click)="print(order)">
								<i class="bi bi-printer"></i>
							</a>
						</p>
					</td>
				</tr>
      </table>
    </div>
  </div>
</main>
