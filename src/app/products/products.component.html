<div class="px-3 py-2 border-bottom mb-3">
  <div class="container d-flex flex-wrap">
    <div class="">
      <button type="button" class="btn btn-primary btn-sm" (click)="openMenu()">
        <i class="bi bi-plus"></i>
        Create new menu
      </button>
    </div>
  </div>
</div>

<main class="container-md">
	<ng-container *ngFor="let menu of menuList">
		<div class="my-3 p-3 bg-body rounded shadow-sm">
			<div class="d-flex">
				<div class="pb-2 mb-0 small lh-sm w-100">
					<div class="d-flex justify-content-between">
						<span class="heading align-self-center">Menu - {{menu.store}}</span>
						<button type="button" class="btn btn-primary btn-sm" (click)="openMenu(menu)">
							<i class="bi bi-pen"></i>
							Edit
						</button>
					</div>
				</div>
			</div>

			<div class="table-responsive">
				<table class="table table-striped table-sm">
					<thead>
						<tr>
							<th scope="col">Meal</th>
							<th scope="col">Type</th>
							<th scope="col">Pricing</th>
						</tr>
					</thead>
					<tbody>
						<tr *ngFor="let items of menu.menuItems">
							<td>{{items.name}}</td>
							<td>{{items.category}}</td>
							<td>
								<div *ngFor="let pricing of items.pricing">
									{{pricing.size}} - {{pricing.price}}
								</div>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>
	</ng-container>
</main>
