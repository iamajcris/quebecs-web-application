<div class="modal-header">
  <h4 class="modal-title">Add Menu</h4>
  <button type="button" class="btn-close" aria-label="Close" (click)="activeModal.dismiss('Cross click')"></button>
</div>
<div class="modal-body">
  <form [formGroup]="form">
    <div class="container">
      <div class="row">
        <div class="col">
          <h5> Select store: </h5>
          <select class="form-select mb-2" formControlName="store">
            <option *ngFor="let types of storeTypes">
              {{types}}
            </option>
          </select>
          <!-- <div class="form-check">
            <input class="form-check-input" type="checkbox" formControlName="isActive" id="flexCheckDefault">
            <label class="form-check-label" for="flexCheckDefault">
              set to active?
            </label>
          </div> -->
        </div>
      </div>
      <div class="row">
        <div class="col">
          <label for="country" class="form-label">Schedule Date</label>
          <div class="input-group input-group-md">
            <input
              class="form-control"
              placeholder="mm-dd-yyyy"
              name="dp"
              formControlName="scheduleDate"
              ngbDatepicker
              #d="ngbDatepicker"
            />
            <button class="btn btn-outline-secondary bi bi-calendar3" (click)="d.toggle()" type="button"></button>
          </div>
        </div>
      </div>
      <div class="container-fluid border-bottom mt-3 mb-3 px-0">
        <h5>Menu list</h5>
      </div>
      <span class="border-bottom"></span>
      <ng-container formArrayName="menuItems">
        <ng-container *ngFor="let item of menuItems.controls; index as i">
          <div class="row mb-3" [formGroup]="item">
            <div class="row">
              <div class="col-8">
                <input type="text" class="form-control" formControlName="name" placeholder="Meal">
                <ng-container *ngIf="item.controls.name.invalid && (item.controls.name.dirty || item.controls.name.touched)">
                  <label class="text-danger" *ngIf="item.controls.name.errors?.['required']">
                    Name is required.
                  </label>
                  <label class="text-danger" *ngIf="item.controls.name.errors?.['minlength']">
                    Name must be at least 4 characters long.
                  </label>
                </ng-container>
              </div>
              <div class="col-3">
                <select class="form-select" formControlName="category">
                  <option selected>{{item.controls.category.value}}</option>
                  <option *ngFor="let category of categoryList">
                    {{category}}
                  </option>
                </select>
              </div>
              <div class="col-1">
                <button *ngIf="i == 0" type="button" class="btn btn-primary" (click)="addMenuItem()"><i class="bi bi-plus-lg"></i></button>
                <button *ngIf="i > 0" type="button" class="btn btn-danger" (click)="deleteItem(i)"><i class="bi bi-trash"></i></button>
              </div>
            </div>
            <div class="d-flex" style="cursor: pointer;">
              <a [routerLink]="" (click)="addPricing(i)" class="text-decoration-none">
                Add pricing <i class="bi bi-plus"></i>
              </a>
            </div>
            <ng-container formArrayName="pricing">
              <div class="row mt-1" *ngFor="let pricing of itemPricing(i).controls; index as p">
                <div class="col-lg-8 col-md-12" [formGroup]="pricing">
                  <div class="input-group">
                    <button class="btn btn-outline-secondary dropdown-toggle w-25" type="button" data-bs-toggle="dropdown" aria-expanded="false" style="min-width: 100px;">
                      {{pricing.value.size}}
                    </button>
                    <ul class="dropdown-menu">
                      <li *ngFor="let type of priceType">
                        <a class="dropdown-item" [routerLink]="" (click)="patchValue(type, pricing.get('size'))">{{type}}</a>
                      </li>
                    </ul>
                    <input type="number" class="form-control" formControlName="price">
                    <!-- <button *ngIf="p == 0" class="btn btn-success" type="button" (click)="addPricing(i)">Add</button> -->
                    <button class="btn btn-secondary" type="button" (click)="deletePricing(i, p)">
                      <i class="bi bi-dash"></i>
                    </button>
                  </div>
                </div>
              </div>
            </ng-container>
          </div>
        </ng-container>
      </ng-container>
    </div>
  </form>
</div>
<div class="modal-footer">
  <button type="button" class="btn btn-primary" (click)="saveMenu()" [disabled]="this.isSaving">
    Save
    <span class="spinner-border spinner-border-sm" role="status" [hidden]="!this.isSaving"></span>
  </button>
</div>
